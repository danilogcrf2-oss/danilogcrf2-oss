<svg xmlns="http://www.w3.org/2000/svg" width="120" height="1150" viewBox="0 0 120 1150">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="60%" stop-color="#052e3b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
  </defs>

  <rect width="120" height="1150" fill="url(#bg-grad)" />
  
  <style>
    @keyframes pulse {
      0% { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
    .pulse-trace { stroke-linecap: round; }
    .pulse-fast { stroke-dasharray: 40 200; animation: pulse 4s linear infinite; }
    .pulse-medium { stroke-dasharray: 30 150; animation: pulse 6s linear infinite; }
    .pulse-medium-delay { stroke-dasharray: 30 150; animation: pulse 6s linear infinite; animation-delay: -3s; }
    .pulse-slow { stroke-dasharray: 50 250; animation: pulse 9s linear infinite; }
  </style>

  <g transform="translate(120, 0) scale(-1, 1)" fill="none" stroke-linecap="round">
    <!-- Linha 1 -->
    <path d="M 15,0 L 15,180 L 45,210 L 45,460 L 25,480 L 25,720 L 60,755 L 60,1150" stroke="#004e5a" stroke-width="3" />
    <path d="M 15,0 L 15,180 L 45,210 L 45,460 L 25,480 L 25,720 L 60,755 L 60,1150" stroke="#00d2ff" stroke-width="4" class="pulse-trace pulse-fast" opacity="0.9" />
    <circle cx="15" cy="180" r="3.5" fill="#00d2ff" />
    <circle cx="45" cy="460" r="3.5" fill="#00d2ff" />
    <circle cx="25" cy="720" r="3.5" fill="#00d2ff" />

    <!-- Linha 2 -->
    <path d="M 35,0 L 35,110 L 60,135 L 60,380 L 30,410 L 30,640 L 50,660 L 50,1150" stroke="#005f73" stroke-width="2" />
    <path d="M 35,0 L 35,110 L 60,135 L 60,380 L 30,410 L 30,640 L 50,660 L 50,1150" stroke="#00979d" stroke-width="2" class="pulse-trace pulse-medium" opacity="0.8" />
    <circle cx="35" cy="110" r="3" fill="#00979d" />
    <circle cx="60" cy="380" r="3" fill="#00979d" />
    <circle cx="30" cy="640" r="3" fill="#00979d" />

    <!-- Linha 3 -->
    <path d="M 55,0 L 55,70 L 80,95 L 80,290 L 50,320 L 50,580 L 75,605 L 75,1150" stroke="#003d52" stroke-width="2" />
    <path d="M 55,0 L 55,70 L 80,95 L 80,290 L 50,320 L 50,580 L 75,605 L 75,1150" stroke="#007cc0" stroke-width="2" class="pulse-trace pulse-slow" opacity="0.8" />
    <circle cx="55" cy="70" r="3" fill="#007cc0" />
    <circle cx="80" cy="290" r="3" fill="#007cc0" />
    <circle cx="50" cy="580" r="3" fill="#007cc0" />

    <!-- Linha 4 -->
    <path d="M 75,0 L 75,140 L 95,160 L 95,420 L 70,445 L 70,780 L 90,800 L 90,1150" stroke="#013a4a" stroke-width="1.5" />
    <path d="M 75,0 L 75,140 L 95,160 L 95,420 L 70,445 L 70,780 L 90,800 L 90,1150" stroke="#00b4d8" stroke-width="1.5" class="pulse-trace pulse-medium" opacity="0.7" />
    <circle cx="75" cy="140" r="2.5" fill="#00b4d8" />
    <circle cx="95" cy="420" r="2.5" fill="#00b4d8" />
    <circle cx="70" cy="780" r="2.5" fill="#00b4d8" />

    <!-- Linha 5 -->
    <path d="M 85,0 L 85,145 L 105,165 L 105,415 L 80,440 L 80,775 L 100,795 L 100,1150" stroke="#013a4a" stroke-width="1.5" />
    <path d="M 85,0 L 85,145 L 105,165 L 105,415 L 80,440 L 80,775 L 100,795 L 100,1150" stroke="#00b4d8" stroke-width="1.5" class="pulse-trace pulse-medium-delay" opacity="0.7" />
    <circle cx="85" cy="145" r="2.5" fill="#00b4d8" />
    <circle cx="105" cy="415" r="2.5" fill="#00b4d8" />
    <circle cx="80" cy="775" r="2.5" fill="#00b4d8" />
  </g>
</svg>
